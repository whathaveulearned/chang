document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dialGradient').attr('id', `glow-${type}`).attr('cx','50%').attr('cy','50%').attr('r','50%');\n    rg.append('stop').attr('offset','0%').attr('stop-color', cfg.hex).attr('stop-opacity','1');\n    rg.append('stop').attr('offset','100%').attr('stop-color', cfg.hex).attr('stop-opacity','0');\n    const rg2 = defs.append('radialGradient').attr('id', `glow-center`).attr('cx','50%').attr('cy','50%').attr('r','50%');\n    rg2.append('stop').attr('offset','0%').attr('stop-color','#ffffff').attr('stop-opacity','0.9');\n    rg2.append('stop').attr('offset','100%').attr('stop-color', cfg.hex).attr('stop-opacity','0');\n  });\n\n  const blurFilter = defs.append('filter').attr('id','blur-sm').attr('x','-100%').attr('y','-100%').attr('width','300%').attr('height','300%');\n  blurFilter.append('feGaussianBlur').attr('stdDeviation','5');\n\n  const blurCenter = defs.append('filter').attr('id','blur-center').attr('x','-200%').attr('y','-200%').attr('width','500%').attr('height','500%');\n  blurCenter.append('feGaussianBlur').attr('stdDeviation','12');\n\n  zoomBehavior = d3.zoom().scaleExtent([0.08, 4]).on('zoom', e => {\n    currentTransform = e.transform;\n    g.attr('transform', e.transform);\n  });\n  svgEl.call(zoomBehavior).on('click', () => { if (!d3.event) closePanel(); });\n\n  // Click on background = close panel\n  svgEl.on('click', function(event) {\n    if (event.target === this || event.target.id === 'graph-svg') closePanel();\n  });\n\n  g = svgEl.append('g');\n\n  // BG stars\n  const bgStars = Array.from({length:220}, (_,i) => ({\n    x: (Math.random()-0.5) * W * 4,\n    y: (Math.random()-0.5) * H * 4,\n    r: Math.random()*1.3+0.2,\n    op: Math.random()*0.45+0.1,\n    dur: 2+Math.random()*5,\n    del: Math.random()*5,\n  }));\n  bgStarSel = g.append('g').attr('class','bg-stars')\n    .selectAll('circle').data(bgStars).join('circle')\n    .attr('cx', d=>d.x).attr('cy', d=>d.y).attr('r', d=>d.r)\n    .attr('fill','white').attr('opacity', d=>d.op)\n    .style('animation', d=>`twinkle ${d.dur}s ${d.del}s infinite ease-in-out`);\n\n  // Links\n  linkSel = g.append('g').attr('class','links')\n    .selectAll('line').data(allLinks).join('line')\n    .attr('stroke', d => {\n      const src = nodeById.get(typeof d.source==='object'?d.source.id:d.source);\n      return src ? TYPE_CONFIG[src.type]?.hex || '#6b7280' : '#6b7280';\n    })\n    .attr('stroke-opacity', TWEAKS.edgeOpacity)\n    .attr('stroke-width', 0.8)\n    .attr('stroke-dasharray','3 6');\n\n  // Glow halos\n  const haloG = g.append('g').attr('class','halos');\n  const halos = haloG.selectAll('circle').data(allNodes).join('circle')\n    .attr('class', d => `halo halo-${d.id.replace(/[^a-zA-Z0-9]/g,'_')}`)\n    .attr('r', d => d.isCenter ? 60 : nodeRadius(d)*3.5)\n    .attr('fill', d => d.isCenter ? 'url(#glow-center)' : `url(#glow-${d.type})`)\n    .attr('opacity', d => d.isCenter ? 0.6 : 0.25)\n    .attr('filter', d => d.isCenter ? 'url(#blur-center)' : 'url(#blur-sm)')\n    .attr('pointer-events','none');\n\n  // Node circles\n  const nodeG = g.append('g').attr('class','nodes');\n  nodeSel = nodeG.selectAll('g').data(allNodes).join('g')\n    .attr('class','node-g')\n    .style('cursor','pointer')\n    .call(d3.drag().on('start',dragStart).on('drag',dragged).on('end',dragEnd))\n    .on('click', (event, d) => { event.stopPropagation(); selectNode(d); })\n    .on('mouseenter', (event, d) => { hoverNode(d, event, true); })\n    .on('mouseleave', (event, d) => { hoverNode(d, event, false); });\n\n  // Outer ring\n  nodeSel.append('circle').attr('class','node-outer')\n    .attr('r', d => d.isCenter ? 20 : nodeRadius(d)+2)\n    .attr('fill','none')\n    .attr('stroke', d => TYPE_CONFIG[d.type]?.hex||'#fff')\n    .attr('stroke-width', d => d.isCenter ? 2 : 0.8)\n    .attr('stroke-opacity', d => d.isCenter ? 0.8 : 0.3);\n\n  // Core\n  nodeSel.append('circle').attr('class','node-core')\n    .attr('r', d => d.isCenter ? 18 : nodeRadius(d))\n    .attr('fill', d => TYPE_CONFIG[d.type]?.hex||'#fff')\n    .attr('opacity', d => d.isCenter ? 1 : 0.85);\n\n  // Inner bright\n  nodeSel.append('circle').attr('class','node-bright')\n    .attr('r', d => d.isCenter ? 7 : nodeRadius(d)*0.38)\n    .attr('fill','white').attr('opacity',0.65);\n\n  // Labels\n  labelSel = g.append('g').attr('class','labels')\n    .selectAll('text').data(allNodes).join('text')\n    .attr('class','node-label')\n    .attr('text-anchor','middle')\n    .attr('dy', d => d.isCenter ? 32 : nodeRadius(d)+13)\n    .attr('font-size', d => d.isCenter ? 12 : Math.min(11, 9+nodeRadius(d)*0.3))\n    .attr('fill', 'rgba(215,225,255,0.75)')\n    .attr('font-weight', d => d.isCenter ? '600' : '400')\n    .style('text-shadow','0 1px 3px rgba(0,0,0,0.9)')\n    .text(d => d.title.length > 14 ? d.title.slice(0,13)+'…' : d.title);\n\n  // Center pulse\n  const cp = g.append('circle').attr('class','center-pulse')\n    .attr('fill','none').attr('stroke','rgba(52,212,240,0.5)').attr('stroke-width','1.5');\n\n  // Store halos ref for toggling\n  svgEl._halos = halos;\n  svgEl._centerPulse = cp;\n}\n\nfunction nodeRadius(d) {\n  if (d.isCenter) return 18;\n  const base = Math.max(3, Math.min(11, 3 + Math.sqrt(d.degree) * 1.2));\n  return base;\n}\n\n// ── SIMULATION ───────────────────────────────────────────────────────\nfunction buildSimulation() {\n  const W = window.innerWidth, H = window.innerHeight;\n  const center = allNodes.find(n=>n.isCenter);\n  if (center) { center.fx = W/2; center.fy = H/2; }\n\n  simulation = d3.forceSimulation(allNodes)\n    .velocityDecay(0.45)\n    .force('link', d3.forceLink(allLinks).id(d=>d.id).distance(d=>{\n      const s = nodeById.get(d.source.id||d.source);\n      const t = nodeById.get(d.target.id||d.target);\n      if (s?.isCenter||t?.isCenter) return 130;\n      return 90;\n    }).strength(1.2))\n    .force('charge', d3.forceManyBody().strength(d => d.isCenter ? -900 : TWEAKS.charge))\n    .force('center', d3.forceCenter(W/2, H/2).strength(0.02))\n    .force('collision', d3.forceCollide().radius(d => d.isCenter ? 40 : nodeRadius(d)+8))\n    .alphaMin(0.001)\n    .on('tick', tick);\n}\n\nfunction tick() {\n  linkSel\n    .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)\n    .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);\n\n  nodeSel.attr('transform', d=>`translate(${d.x||0},${d.y||0})`);\n  labelSel.attr('transform', d=>`translate(${d.x||0},${d.y||0})`);\n  svgEl._halos.attr('cx', d=>d.x||0).attr('cy', d=>d.y||0);\n\n  const c = allNodes.find(n=>n.isCenter);\n  if (c && svgEl._centerPulse) {\n    svgEl._centerPulse.attr('cx', c.x||0).attr('cy', c.y||0);\n  }\n}\n\n// ── DRAG ─────────────────────────────────────────────────────────────\nfunction dragStart(event, d) {\n  if (d.isCenter) return;\n  if (!event.active) simulation.alphaTarget(0.3).restart();\n  d.fx = d.x; d.fy = d.y;\n}\nfunction dragged(event, d) {\n  if (d.isCenter) return;\n  d.fx = event.x; d.fy = event.y;\n}\nfunction dragEnd(event, d) {\n  if (d.isCenter) return;\n  if (!event.active) simulation.alphaTarget(0);\n  d.fx = null; d.fy = null;\n}\n\n// ── HOVER ─────────────────────────────────────────────────────────────\nfunction hoverNode(d, event, on) {\n  const tip = document.getElementById('tooltip');\n  if (on) {\n    tip.style.display = 'block';\n    tip.style.left = event.clientX + 12 + 'px';\n    tip.style.top  = event.clientY - 30 + 'px';\n    const cfg = TYPE_CONFIG[d.type];\n    tip.innerHTML = `<span style=\"font-weight:600\">${d.title}<\u002Fspan> <span style=\"color:${cfg?.hex||'#aaa'};font-size:10px;font-family:'JetBrains Mono',monospace;margin-left:6px\">${cfg?.label||d.type}<\u002Fspan>`;\n\n    // Highlight connected\n    const connIds = new Set(d.links_out);\n    d.links_out.forEach(id => connIds.add(id));\n    allLinks.forEach(l => {\n      const sid = l.source.id||l.source, tid = l.target.id||l.target;\n      if (sid===d.id) connIds.add(tid);\n      if (tid===d.id) connIds.add(sid);\n    });\n    linkSel.attr('stroke-opacity', l => {\n      const sid = l.source.id||l.source, tid = l.target.id||l.target;\n      if (sid===d.id||tid===d.id) return Math.min(TWEAKS.edgeOpacity*3, 0.9);\n      return TWEAKS.edgeOpacity * 0.3;\n    }).attr('stroke-dasharray', l => {\n      const sid = l.source.id||l.source, tid = l.target.id||l.target;\n      return (sid===d.id||tid===d.id) ? 'none' : '3 6';\n    });\n  } else {\n    tip.style.display = 'none';\n    linkSel.attr('stroke-opacity', TWEAKS.edgeOpacity).attr('stroke-dasharray','3 6');\n  }\n}\n\n// ── SELECT ────────────────────────────────────────────────────────────\nfunction selectNode(d) {\n  selectedId = d.id;\n  const cfg = TYPE_CONFIG[d.type] || { label: d.type, hex:'#fff', color:'#fff' };\n\n  document.getElementById('panel-accent').style.background = cfg.hex;\n  document.getElementById('panel-tag').textContent = cfg.label;\n  document.getElementById('panel-tag').style.cssText = `background:${cfg.hex}22;color:${cfg.hex};border:1px solid ${cfg.hex}44`;\n  document.getElementById('panel-title').textContent = d.title;\n\n  // Meta\n  const degree = allLinks.filter(l=>(l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id).length;\n  document.getElementById('panel-meta').textContent = `${degree} 个关联 · ${cfg.label}`;\n\n  // Domain\n  const domEl = document.getElementById('section-domain');\n  const domChips = document.getElementById('panel-domains');\n  if (d.domain && d.domain.length > 0) {\n    domChips.innerHTML = d.domain.map(x=>`<span class=\"domain-chip\">${x}<\u002Fspan>`).join('');\n    domEl.style.display = 'block';\n  } else { domEl.style.display = 'none'; }\n\n  // Dates\n  let dateStr = '';\n  if (d.created) dateStr += `创建 ${d.created}`;\n  if (d.updated) dateStr += (dateStr ? '　更新 ' : '更新 ') + d.updated;\n  if (d.confidence && d.confidence !== 'unknown') dateStr += (dateStr?'　':'') + `置信度 ${d.confidence}`;\n  document.getElementById('panel-dates').textContent = dateStr || '—';\n\n  // Related\n  const relEl = document.getElementById('section-related');\n  const relChips = document.getElementById('panel-related');\n  const relatedIds = new Set();\n  allLinks.forEach(l => {\n    const sid = l.source.id||l.source, tid = l.target.id||l.target;\n    if (sid===d.id) relatedIds.add(tid);\n    if (tid===d.id) relatedIds.add(sid);\n  });\n  const related = [...relatedIds].map(id=>nodeById.get(id)).filter(Boolean);\n  if (related.length > 0) {\n    relChips.innerHTML = related.map(n => {\n      const c = TYPE_CONFIG[n.type];\n      return `<span class=\"related-chip\" style=\"border-color:${c?.hex||'#aaa'}33;color:${c?.hex||'#aaa'}\" onclick=\"selectNodeById('${n.id.replace(/'/g,\"\\\\'\")}')\">\n        ${n.title}\n      <\u002Fspan>`;\n    }).join('');\n    relEl.style.display = 'block';\n  } else { relEl.style.display = 'none'; }\n\n  document.getElementById('panel').classList.add('open');\n  document.getElementById('zoom-controls').style.right = '358px';\n\n  // Dim non-connected links\n  const highlightIds = new Set([d.id, ...relatedIds]);\n  linkSel.attr('stroke-opacity', l => {\n    const sid = l.source.id||l.source, tid = l.target.id||l.target;\n    if (highlightIds.has(sid) && highlightIds.has(tid)) return Math.min(TWEAKS.edgeOpacity*3, 0.9);\n    return TWEAKS.edgeOpacity * 0.15;\n  }).attr('stroke-dasharray', l => {\n    const sid = l.source.id||l.source, tid = l.target.id||l.target;\n    return (highlightIds.has(sid) && highlightIds.has(tid)) ? 'none' : '3 6';\n  });\n}\n\nfunction selectNodeById(id) {\n  const d = nodeById.get(id);\n  if (d) selectNode(d);\n}\n\nfunction closePanel() {\n  selectedId = null;\n  document.getElementById('panel').classList.remove('open');\n  document.getElementById('zoom-controls').style.right = '20px';\n  linkSel.attr('stroke-opacity', TWEAKS.edgeOpacity).attr('stroke-dasharray','3 6');\n}\n\n// ── SEARCH & FILTER ───────────────────────────────────────────────────\nfunction setupUI() {\n  document.getElementById('search').addEventListener('input', e => {\n    searchTerm = e.target.value.trim().toLowerCase();\n    applyFilter();\n  });\n}\n\nfunction setFilter(type) {\n  filterType = filterType === type ? null : type;\n  document.querySelectorAll('.legend-item').forEach(el => el.classList.toggle('active', el.dataset.type === filterType));\n  document.getElementById('clear-filter').style.display = filterType ? 'block' : 'none';\n  applyFilter();\n}\nfunction clearFilter() { filterType = null; document.querySelectorAll('.legend-item').forEach(el=>el.classList.remove('active')); document.getElementById('clear-filter').style.display='none'; applyFilter(); }\n\nfunction applyFilter() {\n  nodeSel.style('opacity', d => {\n    const typeOk = !filterType || d.type === filterType;\n    const searchOk = !searchTerm || d.title.toLowerCase().includes(searchTerm) || (d.domain||[]).join(' ').toLowerCase().includes(searchTerm);\n    return (typeOk && searchOk) ? 1 : 0.1;\n  });\n  labelSel.style('opacity', d => {\n    const typeOk = !filterType || d.type === filterType;\n    const searchOk = !searchTerm || d.title.toLowerCase().includes(searchTerm);\n    return (typeOk && searchOk) ? 1 : 0.05;\n  });\n  linkSel.attr('stroke-opacity', l => {\n    const sid = l.source.id||l.source, tid = l.target.id||l.target;\n    const s = nodeById.get(sid), t = nodeById.get(tid);\n    if (!s||!t) return 0;\n    const sOk = (!filterType||s.type===filterType) && (!searchTerm||s.title.toLowerCase().includes(searchTerm));\n    const tOk = (!filterType||t.type===filterType) && (!searchTerm||t.title.toLowerCase().includes(searchTerm));\n    return (sOk||tOk) ? TWEAKS.edgeOpacity : 0.02;\n  });\n}\n\n// ── LEGEND ────────────────────────────────────────────────────────────\nfunction buildLegend() {\n  const counts = {};\n  allNodes.forEach(n => counts[n.type] = (counts[n.type]||0)+1);\n  const container = document.getElementById('legend-items');\n  container.innerHTML = Object.entries(TYPE_CONFIG).map(([type, cfg]) => `\n    <div class=\"legend-item\" data-type=\"${type}\" onclick=\"setFilter('${type}')\">\n      <div class=\"legend-dot\" style=\"background:${cfg.hex};box-shadow:0 0 6px ${cfg.hex}88\"><\u002Fdiv>\n      <span class=\"legend-label\">${cfg.label}<\u002Fspan>\n      <span class=\"legend-count\">${counts[type]||0}<\u002Fspan>\n    <\u002Fdiv>\n  `).join('');\n}\n\nfunction updateStats() {\n  document.getElementById('stats').innerHTML = `<span><b>${allNodes.length}<\u002Fb> 星体<\u002Fspan><span><b>${allLinks.length}<\u002Fb> 连线<\u002Fspan>`;\n}\n\n// ── ZOOM ──────────────────────────────────────────────────────────────\nfunction zoomIn()    { svgEl.transition().duration(300).call(zoomBehavior.scaleBy, 1.35); }\nfunction zoomOut()   { svgEl.transition().duration(300).call(zoomBehavior.scaleBy, 0.75); }\nfunction resetZoom() {\n  svgEl.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity);\n}\n\n// ── TWEAKS ────────────────────────────────────────────────────────────\nfunction toggleLabels() { TWEAKS.showLabels = document.getElementById('tweak-labels').checked; labelSel.style('display', TWEAKS.showLabels?null:'none'); }\nfunction toggleGlow()   { TWEAKS.showGlow = document.getElementById('tweak-glow').checked; svgEl._halos.style('display', TWEAKS.showGlow?null:'none'); }\nfunction updateEdgeOpacity(v) { TWEAKS.edgeOpacity = +v; linkSel.attr('stroke-opacity', TWEAKS.edgeOpacity); }\nfunction updateCharge(v) {\n  TWEAKS.charge = +v;\n  simulation.force('charge', d3.forceManyBody().strength(d=>d.isCenter?-900:TWEAKS.charge));\n  simulation.alpha(0.3).restart();\n}\n\n// ── TWEAKS HOST BRIDGE ────────────────────────────────────────────────\nwindow.addEventListener('message', e => {\n  if (e.data?.type==='__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('visible');\n  if (e.data?.type==='__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');\n});\nwindow.parent.postMessage({type:'__edit_mode_available'},'*');\n\n// Resize\nwindow.addEventListener('resize', () => {\n  const W = window.innerWidth, H = window.innerHeight;\n  simulation.force('center', d3.forceCenter(W/2,H/2));\n  simulation.alpha(0.2).restart();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
